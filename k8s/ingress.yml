apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: study-planner-ingress
  namespace: study-planner
spec:
  ingressClassName: nginx
  rules:
    - host: study-planner.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend-service
                port:
                  number: 80